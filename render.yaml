# Render blueprint — API only. Frontend deploys to Vercel.
services:
  - type: web
    name: samex-api
    runtime: node
    plan: free
    region: oregon
    # NODE_ENV=production (set at runtime below) makes `npm install` skip
    # devDependencies — TypeScript and @types/* live there. Force devDeps
    # during the build phase.
    buildCommand: NODE_ENV=development npm install --include=dev && npm run build
    startCommand: npm run start -w server
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: 20.18.0
      - key: NODE_ENV
        value: production
      - key: AUTH_USERNAME
        value: admin
      - key: AUTH_PASSWORD
        value: samex2026
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 24h
      # Wildcard so the Vercel preview + production URLs both pass CORS.
      - key: CLIENT_ORIGIN
        value: "*"
      # Optional: set MONGODB_URI to switch storage from JSON file to MongoDB.
      - key: MONGODB_URI
        sync: false
